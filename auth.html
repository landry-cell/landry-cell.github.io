<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2heures17 | Connexion & Inscription</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="stars" id="stars-container"></div>
    
    <div class="container" style="max-width: 500px; padding-top: 100px;">
        <div class="glass">
            <h2 id="form-title" style="margin-bottom: var(--spacing-xl); text-align: center;">Connexion</h2>
            
            <form id="auth-form">
                <div class="form-group" id="pseudo-group" style="display:none;">
                    <label>Pseudo</label>
                    <input type="text" id="pseudo" placeholder="Ton pseudo anonyme">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="email@exemple.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding-right: 40px;">
                        <span id="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 0.8rem; user-select: none;">👁️</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-md);" id="submit-btn">Se connecter</button>
            </form>

            <p style="text-align: center; margin-top: var(--spacing-lg); color: var(--text-muted);">
                <span id="toggle-text">Pas encore de compte ?</span>
                <a href="#" id="toggle-auth" style="color: var(--accent-color); text-decoration: none;">S'inscrire</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let isLogin = true;
        const toggleBtn = document.getElementById('toggle-auth');
        const pseudoGroup = document.getElementById('pseudo-group');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('toggle-password');

        togglePassword.onclick = () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerText = type === 'password' ? '👁️' : '🔒';
        };

        toggleBtn.onclick = (e) => {
            if (e) e.preventDefault();
            isLogin = !isLogin;
            const pseudoDisplay = isLogin ? 'none' : 'block';
            if (pseudoGroup.style.display !== pseudoDisplay) {
                pseudoGroup.style.display = pseudoDisplay;
            }
            
            const title = isLogin ? 'Connexion' : 'Inscription';
            if (formTitle.innerText !== title) {
                formTitle.innerText = title;
            }

            const btnText = isLogin ? 'Se connecter' : "S'inscrire";
            if (submitBtn.innerText !== btnText) {
                submitBtn.innerText = btnText;
            }

            const text = isLogin ? 'Pas encore de compte ?' : 'Déjà un compte ?';
            if (toggleText.innerText !== text) {
                toggleText.innerText = text;
            }

            const linkText = isLogin ? "S'inscrire" : 'Se connecter';
            if (toggleBtn.innerText !== linkText) {
                toggleBtn.innerText = linkText;
            }
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.classList.add('loading');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const pseudo = document.getElementById('pseudo').value;

            const url = isLogin ? '/api/auth/login' : '/api/auth/register';
            const body = isLogin ? { email, password } : { email, password, pseudo };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    const data = await response.json();
                    if (typeof showToast === 'function') {
                        showToast(data.detail || "Erreur de connexion", "danger");
                    }
                    submitBtn.classList.remove('loading');
                }
            } catch (err) {
                if (typeof showToast === 'function') showToast("Erreur de connexion au serveur", "danger");
                submitBtn.classList.remove('loading');
            }
        };
    </script>
</body>
</html>
